site_name: RECOVAR
site_description: Tools for cryo-EM heterogeneity analysis
site_author: Marc Aurele Gilles
site_url: https://ma-gilles.github.io/recovar
repo_name: ma-gilles/recovar
repo_url: https://github.com/ma-gilles/recovar

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Docker & Containers: getting-started/docker.md
    - Test Your Installation: getting-started/testing.md
  - Guide:
    - Web GUI: guide/gui.md
    - Tutorial: guide/tutorial.md
    - Input Data: guide/input-data.md
    - Masks: guide/masks.md
    - Downsampling: guide/downsampling.md
    - Running the Pipeline: guide/pipeline.md
    - Analyzing Results: guide/analysis.md
    - Conformational Density: guide/conformational-density.md
    - Extracting Subsets: guide/extracting-subsets.md
    - Outlier Detection: guide/outlier-detection.md
    - Cryo-ET: guide/cryo-et.md
    - External Embeddings: guide/external-embeddings.md
  - Reference:
    - CLI Commands: reference/cli.md
    - File Formats: reference/file-formats.md
    - Python API:
      - recovar.core: reference/api/core.md
      - recovar.data_io: reference/api/data_io.md
      - recovar.heterogeneity: reference/api/heterogeneity.md
      - recovar.reconstruction: reference/api/reconstruction.md
      - recovar.simulation: reference/api/simulation.md
      - recovar.output: reference/api/output.md
      - recovar.em: reference/api/em.md
      - recovar.utils: reference/api/utils.md
  - Troubleshooting: troubleshooting.md
