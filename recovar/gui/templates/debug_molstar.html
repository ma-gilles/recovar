<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mol* Diagnostic</title>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='vendor/molstar.css') }}">
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: monospace; padding: 20px; }
    #log { background: #1e293b; padding: 12px; border-radius: 8px; max-height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.6; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .warn { color: #fbbf24; }
    .info { color: #38bdf8; }
    #viewport { width: 100%; height: 500px; position: relative; border: 2px solid #334155; border-radius: 8px; margin: 16px 0; }
    h1 { font-size: 18px; margin-bottom: 12px; }
    button { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin: 4px; }
    button:hover { background: #2563eb; }
    input { background: #1e293b; color: #e2e8f0; border: 1px solid #475569; padding: 6px 10px; border-radius: 6px; width: 60%; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Mol* 3D Viewer Diagnostic</h1>

  <div style="margin-bottom: 12px;">
    <label>Volume path: </label>
    <input type="text" id="volPath" value="{{ test_vol }}">
    <button onclick="runFullTest()">Run Full Test</button>
    <button onclick="testWebGL()">Test WebGL Only</button>
  </div>

  <div id="viewport"></div>
  <div id="log"></div>

  <script src="{{ url_for('static', filename='vendor/molstar.js') }}"></script>
  <script>
    const logEl = document.getElementById('log');
    function log(msg, cls) {
      const line = document.createElement('div');
      line.className = cls || 'info';
      line.textContent = `[${new Date().toISOString().slice(11,19)}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function testWebGL() {
      log('--- WebGL Diagnostic ---');

      // Test WebGL1
      try {
        const c1 = document.createElement('canvas');
        const gl1 = c1.getContext('webgl');
        if (gl1) {
          log('WebGL1: Available', 'ok');
          log('  Renderer: ' + gl1.getParameter(gl1.RENDERER));
          log('  Vendor: ' + gl1.getParameter(gl1.VENDOR));
        } else {
          log('WebGL1: NOT available', 'err');
        }
      } catch (e) {
        log('WebGL1 error: ' + e.message, 'err');
      }

      // Test WebGL2
      try {
        const c2 = document.createElement('canvas');
        const gl2 = c2.getContext('webgl2');
        if (gl2) {
          log('WebGL2: Available', 'ok');
          log('  Renderer: ' + gl2.getParameter(gl2.RENDERER));
          log('  Max texture size: ' + gl2.getParameter(gl2.MAX_TEXTURE_SIZE));
          log('  Max 3D texture size: ' + gl2.getParameter(gl2.MAX_3D_TEXTURE_SIZE));
        } else {
          log('WebGL2: NOT available', 'err');
        }
      } catch (e) {
        log('WebGL2 error: ' + e.message, 'err');
      }
    }

    async function runFullTest() {
      logEl.innerHTML = '';
      const el = document.getElementById('viewport');
      el.innerHTML = '';

      // Step 1: WebGL
      testWebGL();

      // Step 2: Check molstar object
      log('--- Mol* Library Check ---');
      if (typeof molstar === 'undefined') {
        log('molstar global is UNDEFINED - library failed to load!', 'err');
        return;
      }
      log('molstar global: defined', 'ok');
      log('molstar.Viewer: ' + (typeof molstar.Viewer), molstar.Viewer ? 'ok' : 'err');
      if (typeof molstar.Viewer?.create !== 'function') {
        log('molstar.Viewer.create is not a function!', 'err');
        return;
      }
      log('molstar.Viewer.create: function', 'ok');

      // Step 3: Create viewer
      log('--- Creating Viewer ---');
      let viewer;
      try {
        viewer = await molstar.Viewer.create(el, {
          layoutIsExpanded: false,
          layoutShowControls: true,
          layoutShowRemoteState: false,
          layoutShowSequence: false,
          layoutShowLog: false,
          layoutShowLeftPanel: false,
          collapseRightPanel: true,
          viewportShowExpand: false,
          viewportShowSelectionMode: false,
          viewportShowAnimation: false,
          viewportShowTrajectoryControls: false,
        });
        log('Viewer created successfully', 'ok');
      } catch (e) {
        log('Viewer.create FAILED: ' + e.message, 'err');
        log('Stack: ' + e.stack, 'err');
        return;
      }

      // Step 4: Check canvas3d
      if (viewer.plugin?.canvas3d) {
        log('canvas3d: initialized', 'ok');
        try {
          viewer.plugin.canvas3d.setProps({
            renderer: { backgroundColor: 0x0f172a },
          });
          log('canvas3d.setProps: success', 'ok');
        } catch (e) {
          log('canvas3d.setProps failed: ' + e.message, 'warn');
        }
      } else {
        log('canvas3d: NULL - WebGL context likely failed!', 'err');
      }

      // Step 5: Check registered formats
      log('--- Data Formats ---');
      const formats = viewer.plugin.dataFormats;
      for (const fmt of ['ccp4', 'mrc', 'dsn6', 'dscif', 'map']) {
        const has = formats.get(fmt);
        log(`  Format "${fmt}": ${has ? 'registered' : 'NOT registered'}`, has ? 'ok' : 'warn');
      }

      // Step 6: Load volume
      const volPath = document.getElementById('volPath').value;
      if (!volPath) {
        log('No volume path specified - skipping load test', 'warn');
        return;
      }

      const url = '/api/volume/raw?path=' + encodeURIComponent(volPath);
      log('--- Loading Volume ---');
      log('URL: ' + url);

      // First verify the endpoint responds
      try {
        const resp = await fetch(url, { method: 'HEAD' });
        log(`Endpoint HEAD response: ${resp.status} ${resp.statusText}`, resp.ok ? 'ok' : 'err');
        if (!resp.ok) {
          log('Volume file not found on server!', 'err');
          return;
        }
      } catch (e) {
        log('Fetch error: ' + e.message, 'err');
        return;
      }

      // Try CCP4 format
      log('Attempting loadVolumeFromUrl with format="ccp4"...');
      try {
        await viewer.loadVolumeFromUrl(
          { url, format: 'ccp4', isBinary: true },
          [{ type: 'relative', value: 1.5, color: 0x38bdf8, alpha: 0.85 }],
          { entryId: 'test-volume' }
        );
        log('Volume loaded with CCP4 format!', 'ok');
      } catch (e) {
        log('CCP4 format FAILED: ' + e.message, 'err');
        log('Stack: ' + (e.stack || '').slice(0, 300), 'err');

        // Try MRC format
        log('Attempting loadVolumeFromUrl with format="mrc"...');
        try {
          await viewer.loadVolumeFromUrl(
            { url, format: 'mrc', isBinary: true },
            [{ type: 'relative', value: 1.5, color: 0x38bdf8, alpha: 0.85 }],
            { entryId: 'test-volume' }
          );
          log('Volume loaded with MRC format!', 'ok');
        } catch (e2) {
          log('MRC format FAILED: ' + e2.message, 'err');

          // Try MAP format
          log('Attempting loadVolumeFromUrl with format="map"...');
          try {
            await viewer.loadVolumeFromUrl(
              { url, format: 'map', isBinary: true },
              [{ type: 'relative', value: 1.5, color: 0x38bdf8, alpha: 0.85 }],
              { entryId: 'test-volume' }
            );
            log('Volume loaded with MAP format!', 'ok');
          } catch (e3) {
            log('MAP format FAILED: ' + e3.message, 'err');
            log('All volume formats failed!', 'err');
          }
        }
      }

      // Step 7: Camera reset
      try {
        viewer.plugin.canvas3d?.requestCameraReset();
        log('Camera reset: done', 'ok');
      } catch (e) {
        log('Camera reset failed: ' + e.message, 'warn');
      }

      log('--- Test Complete ---');
    }

    // Auto-run on load
    window.addEventListener('load', () => {
      setTimeout(runFullTest, 500);
    });
  </script>
</body>
</html>
