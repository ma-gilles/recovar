name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp311-*"
          CIBW_SKIP: "*-musllinux*"

      - name: Install smoke-test dependencies
        shell: bash
        run: python -m pip install --upgrade pip "numpy<2.3.0" pytest

      - name: Smoke test built wheel
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import subprocess
          import sys

          wheels = sorted(glob.glob("wheelhouse/*.whl"))
          if not wheels:
              raise SystemExit("no wheels produced")
          wheel = wheels[0]
          print(f"installing {wheel}")
          subprocess.check_call([sys.executable, "-m", "pip", "install", "--no-deps", wheel])
          PY
          python - <<'PY'
          from recovar.heterogeneity import fast_marching

          assert fast_marching.native_available(), "wheel did not include the native fast-marching extension"
          PY
          python -m pytest tests/unit/test_fast_marching.py tests/unit/test_fast_marching_native.py -q

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    needs:
      - sdist
      - wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Collect distributions
        shell: bash
        run: |
          mkdir -p dist
          find dist-artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          ls -l dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
