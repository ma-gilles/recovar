name: Wheels

on:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".github/workflows/wheels.yml"
      - "pyproject.toml"
      - "setup.py"
      - "MANIFEST.in"
      - "recovar/_fast_marching_native.cpp"
      - "recovar/heterogeneity/fast_marching.py"
      - "recovar/heterogeneity/native_fast_marching/**"
      - "tests/unit/test_fast_marching.py"
      - "tests/unit/test_fast_marching_native.py"
  pull_request:
    paths:
      - ".github/workflows/wheels.yml"
      - "pyproject.toml"
      - "setup.py"
      - "MANIFEST.in"
      - "recovar/_fast_marching_native.cpp"
      - "recovar/heterogeneity/fast_marching.py"
      - "recovar/heterogeneity/native_fast_marching/**"
      - "tests/unit/test_fast_marching.py"
      - "tests/unit/test_fast_marching_native.py"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp311-*"
          CIBW_SKIP: "*-win32 *-musllinux*"

      - name: Install smoke-test dependencies
        shell: bash
        run: python -m pip install --upgrade pip "numpy<2.3.0" pytest

      - name: Smoke test built wheel
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import subprocess
          import sys

          wheels = sorted(glob.glob("wheelhouse/*.whl"))
          if not wheels:
              raise SystemExit("no wheels produced")
          wheel = wheels[0]
          print(f"installing {wheel}")
          subprocess.check_call([sys.executable, "-m", "pip", "install", "--no-deps", wheel])
          PY
          python -m pytest tests/unit/test_fast_marching.py tests/unit/test_fast_marching_native.py -q

      - uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-${{ matrix.os }}
          path: wheelhouse/*.whl
