name: CI

on:
  push:
    branches: [dev, "claude/**"]
  pull_request:
    branches: [dev]

jobs:
  lint:
    name: Lint (changed files only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff

      - name: Ruff format check (changed .py files only)
        run: |
          BASE=${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          bash scripts/check_changed_python.sh --base "$BASE" --format

      - name: Ruff lint (changed .py files only)
        if: always()
        run: |
          BASE=${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          bash scripts/check_changed_python.sh --base "$BASE" --lint

  typecheck:
    name: Type Check (changed files only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install mypy==1.20.0

      - name: Mypy (changed .py files only)
        run: |
          BASE=${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          bash scripts/check_changed_python.sh --base "$BASE" --typecheck

  fast-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "numpy<2.3.0" scipy matplotlib pandas scikit-learn pytest pytest-cov

      - name: Install recovar (no deps, editable)
        run: pip install -e . --no-deps --no-build-isolation --ignore-installed

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -x \
            --ignore=tests/unit/test_gui_app.py \
            --cov=recovar --cov-report=term-missing:skip-covered \
            --tb=short 2>&1 | tail -50

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mkdocs
        run: pip install mkdocs-material mkdocstrings[python]

      - name: Build docs (strict)
        run: mkdocs build --strict 2>&1 || echo "::warning::mkdocs build had warnings"
